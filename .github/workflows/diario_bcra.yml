name: Actualizacion Diaria BCRA

# Cuándo debe ejecutarse este flujo
on:
  schedule:
    # GitHub usa el horario mundial (UTC). 
    # 11:00 UTC equivale exactamente a las 08:00 AM en Argentina.
    # Sintaxis cron: 'minuto hora dia_mes mes dia_semana'
    - cron: '0 11 * * 1-5' # 1-5 significa de Lunes a Viernes
  
  # Este comando agrega un botón en GitHub para ejecutarlo manualmente cuando quieras
  workflow_dispatch: 

# Permisos para que la máquina virtual pueda modificar tu repositorio
permissions:
  contents: write

# Qué debe hacer la máquina virtual
jobs:
  actualizar-base:
    runs-on: ubuntu-latest # Inicia una computadora con Linux
    
    # Otorgamos el token de seguridad a R
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release' # Usa la última versión estable

      - name: Instalar dependencias de R
        # Instalamos los paquetes que tu script necesita
        run: |
          Rscript -e 'install.packages(c("httr", "jsonlite", "dplyr", "stringr", "lubridate"))'

      - name: Configurar identidad de Git
        # R necesita saber "quién" está haciendo el commit
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Ejecutar script de actualización
        # Llama a tu script de R. 
        # (Asegúrate de que la ruta coincida con el nombre que le diste a tu script)
        run: Rscript scripts/actualizacion_diaria.R