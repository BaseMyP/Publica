name: Actualizacion Semanal (IPMP)

# Ejecución todos los sábados a las 08:00 hs ARG (11:00 UTC)
on:
  schedule:
    - cron: '0 11 * * 6'
  
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  actualizar-base-semanal:
    runs-on: ubuntu-latest 
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Instalar dependencias con Caché
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr
            any::jsonlite
            any::dplyr
            any::readxl
            any::lubridate

      - name: Ejecutar Extracción IPMP
        run: |
          Rscript scripts/actualizacion_ipmp.R

      - name: Configurar Git y Subir Cambios
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update semanal (IPMP): $(date +'%Y-%m-%d')"
            git push
            echo "✓ Cambios subidos exitosamente."
          else
            echo "✓ El script corrió, pero no hay datos nuevos para commitear."
          fi
