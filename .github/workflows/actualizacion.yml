name: Actualizacion Diaria Consolidada

on:
  schedule:
    - cron: '07 23 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  actualizar-base-datos:
    runs-on: ubuntu-latest 
    
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }} # <-- Inyección de la llave FRED

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Instalar dependencias con Caché
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr
            any::jsonlite
            any::dplyr
            any::stringr
            any::lubridate
            any::readxl

      - name: Ejecutar Extracción BCRA, INDEC, REM y FRED
        run: |
          Rscript scripts/actualizacion_diaria.R
          Rscript scripts/actualizacion_indec.R
          Rscript scripts/actualizacion_rem.R
          Rscript scripts/actualizacion_fred.R # <-- Nueva ejecución

      - name: Configurar Git y Subir Cambios
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Update diario consolidado: $(date +'%Y-%m-%d')"
            git push
            echo "✓ Cambios subidos exitosamente."
          else
            echo "✓ Los scripts corrieron, pero no hay datos nuevos para commitear hoy."
          fi